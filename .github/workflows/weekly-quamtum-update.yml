name: 🔄 週次 量子コンピューター ニュース更新
 
on:
  schedule:
    # 毎週月曜日 午前9時（日本時間）= UTC 0:00
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 手動実行も可能（GitHubのActionsタブから「Run workflow」）
 
jobs:
  update-quantum-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ファイルをコミット・プッシュするため
 
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
 
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
 
      - name: 依存パッケージをインストール
        run: pip install -r scripts/requirements.txt
 
      - name: 量子ニュースを調査してHTMLを更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_quantum.py
 
      - name: 変更をコミット & プッシュ
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 差分がある場合のみコミット
          git diff --staged --quiet || \
            git commit -m "🔄 週次量子ニュース更新 $(date '+%Y-%m-%d')"
          git push
